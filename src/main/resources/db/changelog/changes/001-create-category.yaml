databaseChangeLog:
  - changeSet:
      id: 001-create-category
      author: nikita
      changes:
        - createSequence:
            sequenceName: category_seq
            incrementBy: 50
            startValue: 1
        - createTable:
            tableName: category
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: description
                  type: varchar(255)
                  constraints:
                    nullable: true
