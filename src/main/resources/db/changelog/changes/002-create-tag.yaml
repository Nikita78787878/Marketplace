databaseChangeLog:
  - changeSet:
      id: 002-create-tag
      author: nikita
      changes:
        - createSequence:
            sequenceName: tag_seq
            incrementBy: 50
            startValue: 1
        - createTable:
            tableName: tag
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    unique: true
                    nullable: false

