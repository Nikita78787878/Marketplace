databaseChangeLog:
  - changeSet:
      id: 003-create-product
      author: nikita
      changes:
        - createSequence:
            sequenceName: product_seq
            incrementBy: 50
            startValue: 1
        - createTable:
            tableName: product
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: price
                  type: decimal(10, 2)
              - column:
                  name: stock_quantity
                  type: int
              - column:
                  name: category_id
                  type: bigint
                  constraints:
                    foreignKeyName: fk_product_category
                    references: category(id)


